name: leap_dockmate
description: LEAP DockMate — Dock Operations for Oracle OTM
version: 7.0.2+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Auth
  http: ^1.2.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Image picking
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Date formatting
  intl: ^0.20.2

  # State management
  provider: ^6.1.2

  # QR scanner
  mobile_scanner: ^7.0.1

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
