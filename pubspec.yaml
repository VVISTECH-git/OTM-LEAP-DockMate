name: leap_dockmate
description: LEAP - Dockmate
version: 7.0.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Auth
  http: ^1.2.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Image picking
  image_picker: ^1.1.2

  # Date formatting
  intl: ^0.19.0

  # State management (lightweight)
  provider: ^6.1.2

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # FIX: Removed 'assets: - assets/' declaration. The assets/ folder does not
  # exist in this project and was causing build warnings. Add it back only if
  # you create the folder and place actual asset files inside it.